apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - target:
      kind: LLMInferenceService
      name: model
    patch: |-
      - op: replace
        path: /metadata/name
        value: granite
      - op: replace
        path: /metadata/annotations/openshift.io~1display-name
        value: granite
      - op: replace
        path: /spec/model/uri
        value: "oci://quay.io/redhat-ai-services/modelcar-catalog:granite-3.3-8b-instruct"
      - op: replace
        path: /spec/model/name
        value: "ibm-granite/granite-3.3-8b-instruct"
