apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sriov-operator
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/managed-by: llm-d-playbooks
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: openshift-sriov-network-operator
    server: "https://kubernetes.default.svc"
  source:
    repoURL: https://github.com/llm-d/llm-d-playbooks.git
    targetRevision: main
    path: 05-ocp-accelerator-operators/10-sriov-operator/base
  project: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 8
      backoff:
        duration: 5s
        maxDuration: 5m0s
        factor: 2
