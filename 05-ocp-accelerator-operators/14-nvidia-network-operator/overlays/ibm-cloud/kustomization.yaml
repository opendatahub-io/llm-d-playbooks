apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# IBM Cloud overlay for NVIDIA Network Operator
# Uses a simpler NicClusterPolicy with just MOFED drivers.
# No SR-IOV device plugin, no RDMA shared devices - IBM Cloud VMs
# already have VFs provided by the hypervisor.

resources:
  - nicclusterpolicy.yaml
