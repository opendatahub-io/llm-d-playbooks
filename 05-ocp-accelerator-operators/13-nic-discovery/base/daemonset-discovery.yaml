apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nic-port-discovery
  namespace: default
  labels:
    app: nic-port-discovery
spec:
  selector:
    matchLabels:
      app: nic-port-discovery
  template:
    metadata:
      labels:
        app: nic-port-discovery
    spec:
      hostNetwork: true
      hostPID: true
      nodeSelector:
        feature.node.kubernetes.io/pci-15b3.present: 'true'
      tolerations:
        - operator: Exists
      serviceAccountName: nic-discovery-sa
      initContainers:
        - name: discover-ports
          image: registry.access.redhat.com/ubi9/ubi:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "Installing pciutils..."
              yum install -y pciutils &>/dev/null || dnf install -y pciutils &>/dev/null
              echo "Running discovery script..."
              /bin/bash /scripts/discover-nic-ports.sh
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: discovery-script
              mountPath: /scripts
            - name: host-sys
              mountPath: /sys
              readOnly: false
            - name: discovery-output
              mountPath: /discovery
      containers:
        - name: pause
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["sh", "-c", "echo 'Discovery complete. Keeping pod alive for file collection.'; sleep infinity"]
          volumeMounts:
            - name: discovery-output
              mountPath: /discovery
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: discovery-script
          configMap:
            name: nic-port-discovery-script
            defaultMode: 0755
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: discovery-output
          hostPath:
            path: /var/lib/nic-discovery
            type: DirectoryOrCreate
