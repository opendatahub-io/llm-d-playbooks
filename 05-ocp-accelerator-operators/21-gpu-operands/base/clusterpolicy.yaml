apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
  namespace: nvidia-gpu-operator
spec:
  operator:
    defaultRuntime: crio
    initContainer: {}
    runtimeClass: nvidia
    use_ocp_driver_toolkit: true
  driver:
    enabled: true
    kernelModuleType: auto
    certConfig:
      name: ''
    rdma:
      enabled: true
      useHostMofed: false
    useNvidiaDriverCRD: false
    kernelModuleConfig:
      name: 'kernel-module-params'
    usePrecompiled: false
    repoConfig:
      configMapName: ''
    upgradePolicy:
      autoUpgrade: true
      maxParallelUpgrades: 1
      maxUnavailable: 25%
      drain:
        deleteEmptyDir: false
        enable: false
        force: false
        timeoutSeconds: 300
      podDeletion:
        deleteEmptyDir: false
        force: false
        timeoutSeconds: 300
      waitForCompletion:
        timeoutSeconds: 0
  dcgm:
    enabled: true
  dcgmExporter:
    enabled: true
    serviceMonitor:
      enabled: true
  nodeStatusExporter:
    enabled: true
  devicePlugin:
    enabled: true
    config:
      default: ''
      name: ''
  sandboxDevicePlugin:
    enabled: true
  mig:
    strategy: none
  migManager:
    enabled: false
  vgpuDeviceManager:
    enabled: true
  gdrcopy:
    enabled: true
  gfd:
    enabled: true
  vfioManager:
    enabled: true
  toolkit:
    enabled: true
    installDir: /usr/local/nvidia
  daemonsets:
    rollingUpdate:
      maxUnavailable: '1'
    updateStrategy: RollingUpdate
  validator:
    plugin:
      env: []
  sandboxWorkloads:
    defaultWorkload: container
    enabled: false
  gds:
    enabled: false
  vgpuManager:
    enabled: false
