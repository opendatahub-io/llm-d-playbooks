# NVIDIA Network Operator: Mellanox driver only (RoCE handled by SR-IOV Operator).
apiVersion: mellanox.com/v1alpha1
kind: NicClusterPolicy
metadata:
  name: nic-cluster-policy
spec:
  ofedDriver:
    image: doca-driver
    repository: nvcr.io/nvidia/mellanox
    version: doca3.1.0-25.07-0.9.7.0-0
    env:
      - name: UNLOAD_STORAGE_MODULES
        value: 'true'
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 30
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 20
  terminationGracePeriodSeconds: 300
  upgradePolicy:
    autoUpgrade: true
    drain:
      enable: true
      force: true
      deleteEmptyDir: true
      timeoutSeconds: 300
    podSelector: ''
    maxParallelUpgrades: 2
